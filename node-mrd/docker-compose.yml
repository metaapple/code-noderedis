services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    # 외부에서 redis-cli로 테스트할 일이 없으면 포트 매핑 생략
    # ports:
    #   - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  web:
      build: ./web
      ports:
        - "9092:3000"
      environment:
        - PORT=3000
        - REDIS_URL=redis://redis:6379/0
      depends_on:
        redis:
          condition: service_healthy
      restart: always

volumes:
  redis_data:
